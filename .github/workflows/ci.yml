name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      JWT_SECRET_KEY: "ci-only-jwt-secret-key-minimum-32-chars-here"
      MASTER_ENCRYPTION_KEY: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
      TELEGRAM_BOT_TOKEN: "0:ci-test-token"
      TELEGRAM_WEBHOOK_SECRET: "ci-webhook-secret"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DEBUG: "false"
      LOG_LEVEL: "WARNING"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Type check with mypy
        run: mypy app --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true
